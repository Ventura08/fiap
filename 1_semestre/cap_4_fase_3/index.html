<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="container-fluid min-vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="card w-75 rounded-3 px-2 py-3">
        <div class="card-body">
          <h6 class="information mt-4">Calculadora</h6>
          <div class="row">
            <div class="col-sm-12">
              <div class="form-group">
                <input
                  id="first-value"
                  class="form-control"
                  type="number"
                  placeholder="Valor 1"
                />
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12">
              <div class="form-group">
                <div class="input-group">
                  <input
                    id="second-value"
                    class="form-control"
                    type="number"
                    placeholder="Valor 2"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12">
              <div class="form-group">
                <input
                  id="result"
                  class="form-control"
                  type="text"
                  placeholder="Resultado"
                  disabled
                />
              </div>
            </div>
          </div>
          <div class="container overflow-hidden mt-5">
            <div class="row g-2">
              <div class="col-md-3 col-sm-6 col-xs-12">
                <button
                  id="sum-button"
                  class="w-100 btn btn-outline-success col-md-3 col-sm-6 col-xs-12"
                >
                  Somar
                </button>
              </div>
              <div class="col-md-3 col-sm-6 col-xs-12">
                <button
                  id="multiply-button"
                  class="w-100 btn btn-outline-success col-md-3 col-sm-6 col-xs-12"
                >
                  Multiplicar
                </button>
              </div>
              <div class="col-md-3 col-sm-6 col-xs-12">
                <button
                  id="subtract-button"
                  class="w-100 btn btn-outline-success col-md-3 col-sm-6 col-xs-12"
                >
                  Subtrair
                </button>
              </div>
              <div class="col-md-3 col-sm-6 col-xs-12">
                <button
                  id="divide-button"
                  class="w-100 btn btn-outline-success col-md-3 col-sm-6 col-xs-12"
                >
                  Dividir
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>

services:

  # ── SQL Server 2022 Express (local, grátis, sem licença) ─────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Vinheria@2026"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - "Vinheria@2026"
        - -Q
        - "SELECT 1"
        - -b
        - -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Cria banco + tabelas + dados (roda uma vez e termina) ─────────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql:/sql
    environment:
      SA_PASSWORD: "Vinheria@2026"
    command:
      - bash
      - /sql/init.sh
    restart: "no"

  # ── Aplicação Tomcat ──────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:sqlserver://sqlserver:1433;database=agnello;encrypt=false;trustServerCertificate=true;"
      DB_USER: "sa"
      DB_PASSWORD: "Vinheria@2026"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  sqldata:
